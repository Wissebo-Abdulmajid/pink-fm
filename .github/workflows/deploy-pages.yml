name: Verify and deploy Pink FM to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up active LTS Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install locked dependencies
        run: npm ci

      - name: Determine deployment base
        shell: bash
        env:
          CUSTOM_BASE: ${{ vars.VITE_BASE_PATH }}
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ -n "$CUSTOM_BASE" ]]; then
            BASE="$CUSTOM_BASE"
          else
            BASE="/$REPOSITORY_NAME/"
          fi
          echo "VITE_BASE_PATH=$BASE" >> "$GITHUB_ENV"
          echo "Building Pink FM with base path: $BASE"

      - name: Run complete quality gate
        run: npm run verify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
