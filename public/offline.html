<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#d94f83" />
    <title>Pink FM — Offline</title>
    <style>
      :root{font-family:system-ui,sans-serif;color:#3f2431;background:#fff7fa}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:1rem;box-sizing:border-box}.card{width:min(100%,30rem);padding:2rem;border:1px solid #edb4c9;border-radius:1.5rem;background:#fff;box-shadow:0 18px 45px #4a20361c;text-align:center}.radio{display:grid;width:5rem;height:5rem;margin:0 auto 1rem;place-items:center;border-radius:1.2rem;background:#d94f83;color:#fff;font-size:2rem}h1{font-family:Georgia,serif;font-size:2.2rem;line-height:1;margin:.5rem 0}p{color:#775866}a{display:inline-block;min-height:44px;margin-top:.6rem;padding:.75rem 1rem;border-radius:999px;background:#a8275c;color:#fff;font-weight:700;text-decoration:none}a:focus-visible{outline:3px solid #4a2036;outline-offset:3px}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="radio" aria-hidden="true">FM</div>
      <h1>The signal is offline</h1>
      <p>Pink FM can reopen cached profiles and recommendations after the app shell has been visited once. External music playback still needs a connection.</p>
      <a href="./#/g/siti">Try the cached station</a>
    </main>
  </body>
</html>
